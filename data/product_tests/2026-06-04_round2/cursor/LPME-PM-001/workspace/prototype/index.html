<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PM Review Board</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #fff;
      --border: #dfe1e6;
      --text: #172b4d;
      --muted: #5e6c84;
      --accent: #0052cc;
      --accent-hover: #0747a6;
      --draft: #6554c0;
      --ready: #00875a;
      --blocked: #de350b;
      --warning: #ff8b00;
      --legal: #403294;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(9, 30, 66, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 1.125rem; font-weight: 600; }

    .btn {
      border: none;
      border-radius: var(--radius);
      padding: 0.5rem 0.875rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { background: #a5adba; cursor: not-allowed; }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: #ebecf0; }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      max-width: 1200px;
      margin: 0 auto;
      min-height: calc(100vh - 57px);
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1rem;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 0.5rem;
      margin-top: 1rem;
    }

    .sidebar h2:first-child { margin-top: 0; }

    .task-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.625rem 0.75rem;
      margin-bottom: 0.25rem;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--text);
    }

    .task-item:hover { background: #ebecf0; }
    .task-item.active {
      background: #deebff;
      border-color: #4c9aff;
    }

    .task-item .title { font-weight: 500; display: block; }
    .task-item .meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.125rem;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 0.125rem 0.375rem;
      border-radius: 3px;
      margin-left: 0.25rem;
      vertical-align: middle;
    }

    .badge-legal { background: #eae6ff; color: var(--legal); }

    .main {
      padding: 1.25rem;
      overflow-y: auto;
    }

    .status-pill {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.5rem;
      border-radius: 999px;
      margin-bottom: 0.75rem;
    }

    .status-draft { background: #eae6ff; color: var(--draft); }
    .status-ready { background: #e3fcef; color: var(--ready); }
    .status-blocked { background: #ffebe6; color: var(--blocked); }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .panel-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.875rem;
    }

    .panel-body { padding: 1rem; }

    .preview-content {
      background: #fafbfc;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      font-size: 0.875rem;
      white-space: pre-wrap;
    }

    .legal-banner {
      background: #eae6ff;
      border: 1px solid #c0b6f2;
      color: var(--legal);
      padding: 0.625rem 0.75rem;
      border-radius: var(--radius);
      font-size: 0.8125rem;
      margin-bottom: 0.75rem;
      display: none;
    }

    .legal-banner.visible { display: block; }

    .risk-list label {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #ebecf0;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .risk-list label:last-child { border-bottom: none; }

    .risk-list input { margin-top: 0.2rem; flex-shrink: 0; }

    .risk-unresolved {
      color: var(--warning);
      font-size: 0.75rem;
      margin-top: 0.5rem;
    }

    .comments textarea {
      width: 100%;
      min-height: 72px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem;
      font-family: inherit;
      font-size: 0.875rem;
      resize: vertical;
    }

    .comment-thread {
      margin-top: 0.75rem;
      font-size: 0.8125rem;
    }

    .comment {
      padding: 0.5rem;
      background: #f4f5f7;
      border-radius: var(--radius);
      margin-bottom: 0.5rem;
    }

    .comment .author { font-weight: 600; color: var(--muted); font-size: 0.75rem; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

  /* Mobile: tabs + stacked */
    .mobile-tabs { display: none; }

    .export-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(9, 30, 66, 0.5);
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 100;
    }

    .export-modal.open { display: flex; }

    .export-dialog {
      background: var(--surface);
      border-radius: var(--radius);
      max-width: 520px;
      width: 100%;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .export-dialog pre {
      padding: 1rem;
      overflow: auto;
      font-size: 0.75rem;
      background: #f4f5f7;
      flex: 1;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .export-dialog .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }

      .sidebar { display: none; }

      .mobile-tabs {
        display: flex;
        gap: 0.25rem;
        padding: 0.75rem 1rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
      }

      .mobile-tabs button {
        flex-shrink: 0;
        padding: 0.375rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        font-size: 0.8125rem;
        cursor: pointer;
      }

      .mobile-tabs button.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .mobile-task-picker {
        display: block;
        padding: 0 1rem 0.75rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }

      .mobile-task-picker select {
        width: 100%;
        padding: 0.5rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        font-size: 0.875rem;
      }

      .main { padding: 1rem; }
    }

    @media (min-width: 769px) {
      .mobile-task-picker { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>PM Review Board</h1>
    <button type="button" class="btn btn-secondary" id="exportBtn">Export Summary</button>
  </header>

  <nav class="mobile-tabs" id="mobileTabs" aria-label="Status filters"></nav>
  <div class="mobile-task-picker">
    <label for="mobileTaskSelect" class="sr-only" style="position:absolute;left:-9999px">Select task</label>
    <select id="mobileTaskSelect" aria-label="Select task"></select>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="Task list"></aside>
    <main class="main" id="main">
      <p style="color: var(--muted);">Select a task to review.</p>
    </main>
  </div>

  <div class="export-modal" id="exportModal" role="dialog" aria-labelledby="exportTitle">
    <div class="export-dialog">
      <div class="panel-header">
        <span id="exportTitle">Export for ticket</span>
        <button type="button" class="btn btn-secondary" id="closeExport">Close</button>
      </div>
      <pre id="exportContent"></pre>
      <div style="padding: 0.75rem 1rem; border-top: 1px solid var(--border);">
        <button type="button" class="btn btn-primary" id="copyExport">Copy to clipboard</button>
      </div>
    </div>
  </div>

  <script>
    const RISKS = [
      { id: "scope", label: "Scope matches the feature brief" },
      { id: "metrics", label: "Success metrics are defined and measurable" },
      { id: "privacy", label: "No unresolved customer-data handling concerns" },
      { id: "deps", label: "Dependencies and assumptions are documented" }
    ];

    const TASKS = [
      {
        id: "t1",
        title: "Checkout PRD v2",
        status: "draft",
        artifactType: "PRD",
        mentionsCustomerData: true,
        preview: "Overview: Streamline guest checkout.\n\nOpen questions:\n- Store email for abandoned cart recovery (customer PII).\n- Payment provider SLA not confirmed.",
        comments: [
          { author: "PM", text: "Need legal sign-off on email retention." }
        ],
        risks: { scope: false, metrics: false, privacy: false, deps: false }
      },
      {
        id: "t2",
        title: "Onboarding landing page",
        status: "draft",
        artifactType: "Landing page",
        mentionsCustomerData: false,
        preview: "Hero: Welcome new teams.\nCTA: Start free trial.\n\nCopy draft only — no analytics pixels yet.",
        comments: [],
        risks: { scope: true, metrics: true, privacy: true, deps: true }
      },
      {
        id: "t3",
        title: "Usage dashboard spec",
        status: "ready",
        statusLabel: "ready for review",
        artifactType: "Dashboard",
        mentionsCustomerData: true,
        preview: "Widgets: DAU, feature adoption, export usage.\nData: Aggregated metrics only; no row-level customer exports in v1.",
        comments: [
          { author: "Engineer", text: "Acceptance criteria look complete. Ready to estimate." },
          { author: "Designer", text: "Mobile layout called out in wireframe section." }
        ],
        risks: { scope: true, metrics: true, privacy: true, deps: true }
      },
      {
        id: "t4",
        title: "Churn analysis memo",
        status: "blocked",
        artifactType: "Analysis memo",
        mentionsCustomerData: true,
        preview: "Blocked: dataset access pending.\nPreliminary read suggests Q1 spike tied to billing changes.",
        comments: [
          { author: "PM", text: "Cannot review until data team shares sample." }
        ],
        risks: { scope: false, metrics: false, privacy: false, deps: false }
      }
    ];

    let selectedId = "t1";
    let mobileStatusFilter = "all";

    function statusLabel(task) {
      if (task.status === "ready") return "ready for review";
      if (task.status === "draft") return "draft";
      return "blocked";
    }

    function statusClass(task) {
      if (task.status === "ready") return "status-ready";
      if (task.status === "draft") return "status-draft";
      return "status-blocked";
    }

    function groupKey(task) {
      if (task.status === "ready") return "Ready for Review";
      if (task.status === "draft") return "Draft";
      return "Blocked";
    }

    function allRisksResolved(task) {
      return RISKS.every(r => task.risks[r.id]);
    }

    function unresolvedCount(task) {
      return RISKS.filter(r => !task.risks[r.id]).length;
    }

    function getTask(id) {
      return TASKS.find(t => t.id === id);
    }

    function renderSidebar() {
      const groups = {};
      TASKS.forEach(t => {
        const g = groupKey(t);
        if (!groups[g]) groups[g] = [];
        groups[g].push(t);
      });

      const order = ["Draft", "Ready for Review", "Blocked"];
      const sidebar = document.getElementById("sidebar");
      sidebar.innerHTML = order.filter(g => groups[g]).map(g => `
        <h2>${g}</h2>
        ${groups[g].map(t => `
          <button type="button" class="task-item ${t.id === selectedId ? "active" : ""}"
            data-id="${t.id}" onclick="selectTask('${t.id}')">
            <span class="title">${t.title}${t.mentionsCustomerData ? '<span class="badge badge-legal">PII</span>' : ""}</span>
            <span class="meta">${t.artifactType}${t.status === "draft" && unresolvedCount(t) ? ` · ${unresolvedCount(t)} risk(s)` : ""}</span>
          </button>
        `).join("")}
      `).join("");
    }

    function renderMobileTabs() {
      const tabs = ["all", "draft", "ready", "blocked"];
      const labels = { all: "All", draft: "Draft", ready: "Ready", blocked: "Blocked" };
      document.getElementById("mobileTabs").innerHTML = tabs.map(tab => `
        <button type="button" class="${mobileStatusFilter === tab ? "active" : ""}"
          onclick="setMobileFilter('${tab}')">${labels[tab]}</button>
      `).join("");
    }

    function renderMobileSelect() {
      const filtered = TASKS.filter(t => {
        if (mobileStatusFilter === "all") return true;
        if (mobileStatusFilter === "ready") return t.status === "ready";
        return t.status === mobileStatusFilter;
      });
      const sel = document.getElementById("mobileTaskSelect");
      sel.innerHTML = filtered.map(t =>
        `<option value="${t.id}" ${t.id === selectedId ? "selected" : ""}>${t.title} (${statusLabel(t)})</option>`
      ).join("");
      if (!filtered.find(t => t.id === selectedId) && filtered[0]) {
        selectedId = filtered[0].id;
      }
    }

    function renderMain() {
      const task = getTask(selectedId);
      if (!task) return;

      const unresolved = unresolvedCount(task);
      const canMarkReady = task.status === "draft" && allRisksResolved(task);

      document.getElementById("main").innerHTML = `
        <span class="status-pill ${statusClass(task)}">${statusLabel(task)}</span>
        <h2 style="font-size:1.25rem;margin-bottom:1rem;">${task.title}</h2>

        <section class="panel" aria-label="Artifact preview">
          <div class="panel-header">Artifact preview · ${task.artifactType}</div>
          <div class="panel-body">
            <div class="legal-banner ${task.mentionsCustomerData ? "visible" : ""}" role="alert">
              Legal: This artifact mentions customer data. Confirm privacy checklist before marking ready.
            </div>
            <div class="preview-content">${escapeHtml(task.preview)}</div>
          </div>
        </section>

        <section class="panel" aria-label="Risk checklist">
          <div class="panel-header">Risk checklist</div>
          <div class="panel-body">
            <div class="risk-list" id="riskList">
              ${RISKS.map(r => `
                <label>
                  <input type="checkbox" data-risk="${r.id}" ${task.risks[r.id] ? "checked" : ""}
                    ${task.status !== "draft" ? "disabled" : ""}
                    onchange="toggleRisk('${task.id}', '${r.id}', this.checked)">
                  <span>${r.label}</span>
                </label>
              `).join("")}
            </div>
            ${task.status === "draft" && unresolved > 0 ? `
              <p class="risk-unresolved" id="riskWarning">${unresolved} unresolved risk(s) — resolve before marking ready.</p>
            ` : task.status === "draft" ? `
              <p class="risk-unresolved" style="color:var(--ready);" id="riskWarning">All risks addressed. You may mark ready for review.</p>
            ` : ""}
          </div>
        </section>

        <section class="panel" aria-label="Reviewer comments">
          <div class="panel-header">Reviewer comments</div>
          <div class="panel-body">
            <div class="comment-thread">
              ${task.comments.length ? task.comments.map(c => `
                <div class="comment"><div class="author">${escapeHtml(c.author)}</div>${escapeHtml(c.text)}</div>
              `).join("") : "<p style='color:var(--muted);font-size:0.875rem;'>No comments yet.</p>"}
            </div>
            ${task.status === "draft" ? `
              <div style="margin-top:0.75rem;">
                <textarea id="newComment" placeholder="Add a reviewer comment…"></textarea>
                <button type="button" class="btn btn-secondary" style="margin-top:0.5rem;" onclick="addComment('${task.id}')">Add comment</button>
              </div>
            ` : ""}
          </div>
        </section>

        <div class="actions">
          ${task.status === "draft" ? `
            <button type="button" class="btn btn-primary" id="markReadyBtn"
              ${canMarkReady ? "" : "disabled"}
              onclick="markReady('${task.id}')"
              title="${canMarkReady ? "" : "Resolve all risks first"}">
              Mark ready for review
            </button>
          ` : ""}
          <button type="button" class="btn btn-secondary" onclick="openExport('${task.id}')">Export acceptance checklist</button>
        </div>
      `;
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function selectTask(id) {
      selectedId = id;
      renderSidebar();
      renderMobileSelect();
      renderMain();
    }

    function setMobileFilter(tab) {
      mobileStatusFilter = tab;
      renderMobileTabs();
      renderMobileSelect();
      renderSidebar();
      renderMain();
    }

    function toggleRisk(taskId, riskId, checked) {
      const task = getTask(taskId);
      if (!task || task.status !== "draft") return;
      task.risks[riskId] = checked;
      renderSidebar();
      renderMain();
    }

    function markReady(taskId) {
      const task = getTask(taskId);
      if (!task || !allRisksResolved(task)) return;
      task.status = "ready";
      renderSidebar();
      renderMobileTabs();
      renderMobileSelect();
      renderMain();
    }

    function addComment(taskId) {
      const task = getTask(taskId);
      const ta = document.getElementById("newComment");
      const text = (ta && ta.value || "").trim();
      if (!task || !text) return;
      task.comments.push({ author: "You", text });
      renderMain();
    }

    function buildExport(task) {
      const checks = RISKS.map(r => `- [${task.risks[r.id] ? "x" : " "}] ${r.label}`).join("\n");
      return `## ${task.title}
Status: ${statusLabel(task)}
Artifact: ${task.artifactType}
${task.mentionsCustomerData ? "⚠ Legal: mentions customer data\n" : ""}

### Acceptance checklist
${checks}

### Artifact summary
${task.preview}

### Comments
${task.comments.map(c => `- **${c.author}**: ${c.text}`).join("\n") || "- (none)"}
`;
    }

    function openExport(taskId) {
      const task = getTask(taskId);
      document.getElementById("exportContent").textContent = buildExport(task);
      document.getElementById("exportModal").classList.add("open");
    }

    document.getElementById("exportBtn").addEventListener("click", () => {
      const draft = TASKS.filter(t => t.status === "draft");
      const ready = TASKS.filter(t => t.status === "ready");
      const blocked = TASKS.filter(t => t.status === "blocked");
      const summary = `# PM Review Board — Summary
Generated: ${new Date().toLocaleString()}

## Draft (${draft.length})
${draft.map(t => `- ${t.title}${unresolvedCount(t) ? ` (${unresolvedCount(t)} open risks)` : ""}`).join("\n") || "- none"}

## Ready for review (${ready.length})
${ready.map(t => `- ${t.title}`).join("\n") || "- none"}

## Blocked (${blocked.length})
${blocked.map(t => `- ${t.title}`).join("\n") || "- none"}
`;
      document.getElementById("exportContent").textContent = summary;
      document.getElementById("exportTitle").textContent = "Board summary";
      document.getElementById("exportModal").classList.add("open");
    });

    document.getElementById("closeExport").addEventListener("click", () => {
      document.getElementById("exportModal").classList.remove("open");
    });

    document.getElementById("copyExport").addEventListener("click", async () => {
      const text = document.getElementById("exportContent").textContent;
      try {
        await navigator.clipboard.writeText(text);
        document.getElementById("copyExport").textContent = "Copied!";
        setTimeout(() => { document.getElementById("copyExport").textContent = "Copy to clipboard"; }, 2000);
      } catch {
        document.getElementById("copyExport").textContent = "Select and copy manually";
      }
    });

    document.getElementById("mobileTaskSelect").addEventListener("change", e => {
      selectTask(e.target.value);
    });

    renderSidebar();
    renderMobileTabs();
    renderMobileSelect();
    renderMain();
  </script>
</body>
</html>
