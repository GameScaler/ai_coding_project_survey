<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PM Review Board Prototype</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-alt: #f1f5f4;
      --ink: #17202a;
      --muted: #617080;
      --line: #d9e0e4;
      --teal: #087f73;
      --teal-dark: #06675e;
      --amber: #b56a00;
      --red: #b42318;
      --blue: #2457a6;
      --shadow: 0 14px 30px rgba(20, 32, 43, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(10px);
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .board {
      display: grid;
      grid-template-columns: minmax(260px, 330px) minmax(0, 1fr);
      gap: 18px;
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px 24px 28px;
    }

    .task-panel,
    .preview-panel,
    .review-panel,
    .export-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .task-panel {
      align-self: start;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h2,
    .preview-title h2,
    .review-section h2,
    .export-panel h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .count-pill {
      min-width: 28px;
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--surface-alt);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-align: center;
    }

    .status-tabs {
      display: none;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfc;
    }

    .tab-button,
    .ghost-button,
    .primary-button,
    .secondary-button {
      min-height: 40px;
      border-radius: 7px;
      padding: 0 13px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0;
    }

    .tab-button {
      white-space: nowrap;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
    }

    .tab-button.is-active {
      border-color: var(--teal);
      color: var(--teal-dark);
      background: #e9f6f4;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
    }

    .ghost-button:hover,
    .tab-button:hover {
      border-color: #9aabb4;
    }

    .primary-button {
      background: var(--teal);
      color: #ffffff;
    }

    .primary-button:hover {
      background: var(--teal-dark);
    }

    .secondary-button {
      border: 1px solid #bad1ce;
      background: #e9f6f4;
      color: var(--teal-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .task-groups {
      padding: 8px;
    }

    .task-group + .task-group {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px 8px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .task-button {
      display: grid;
      width: 100%;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 11px 10px;
      border-radius: 8px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: left;
    }

    .task-button:hover {
      background: #f3f7f7;
    }

    .task-button.is-selected {
      outline: 2px solid #9fd3cc;
      background: #e9f6f4;
    }

    .task-title {
      display: block;
      font-weight: 800;
    }

    .task-meta {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .risk-chip,
    .status-chip,
    .severity-chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .risk-chip {
      background: #fff3df;
      color: #855000;
    }

    .risk-chip.clear {
      background: #e7f5ed;
      color: #20623e;
    }

    .status-chip.draft {
      background: #eaf0f7;
      color: #244e87;
    }

    .status-chip.ready {
      background: #e7f5ed;
      color: #20623e;
    }

    .status-chip.blocked {
      background: #fde9e7;
      color: #9f1f17;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
      gap: 18px;
      min-width: 0;
    }

    .preview-panel {
      min-width: 0;
      overflow: hidden;
    }

    .preview-hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbfb 100%);
    }

    .preview-title {
      min-width: 0;
    }

    .preview-title h2 {
      font-size: 1.3rem;
    }

    .preview-title p {
      margin: 5px 0 0;
      color: var(--muted);
    }

    .preview-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      align-content: start;
    }

    .review-status {
      margin: 0;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff9ed;
      color: #714500;
      font-weight: 700;
    }

    .review-status.ready {
      background: #eef8f0;
      color: #1d5b39;
    }

    .review-status.blocked {
      background: #fff0ef;
      color: #8a1e17;
    }

    .artifact {
      padding: 18px;
    }

    .artifact-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .meta-box {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfc;
    }

    .meta-label {
      display: block;
      color: var(--muted);
      font-size: 0.73rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-value {
      display: block;
      margin-top: 3px;
      overflow-wrap: anywhere;
      font-weight: 800;
    }

    .doc-preview {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .doc-section {
      padding: 15px;
    }

    .doc-section + .doc-section {
      border-top: 1px solid var(--line);
    }

    .doc-section h3 {
      margin: 0 0 8px;
      font-size: 0.96rem;
    }

    .doc-section p,
    .doc-section ul {
      margin: 0;
      color: #344251;
    }

    .doc-section ul {
      padding-left: 20px;
    }

    .doc-section li + li {
      margin-top: 5px;
    }

    .review-panel {
      align-self: start;
      min-width: 0;
      overflow: hidden;
    }

    .review-section {
      padding: 16px;
    }

    .review-section + .review-section {
      border-top: 1px solid var(--line);
    }

    .review-lede {
      margin: 6px 0 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .risk-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .risk-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: #fbfcfc;
    }

    .risk-item input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--teal);
    }

    .risk-copy {
      min-width: 0;
    }

    .risk-copy label {
      display: block;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .severity-chip {
      margin-top: 6px;
      background: #eef1f5;
      color: #4d5d6c;
    }

    .severity-chip.high {
      background: #fde9e7;
      color: #9f1f17;
    }

    .severity-chip.medium {
      background: #fff3df;
      color: #855000;
    }

    .comment-list {
      display: grid;
      gap: 10px;
      margin: 0 0 12px;
      padding: 0;
      list-style: none;
    }

    .comment {
      border-left: 3px solid #9fd3cc;
      padding: 8px 10px;
      background: #f7fbfa;
    }

    .comment strong {
      display: block;
      margin-bottom: 2px;
    }

    .comment span {
      color: #344251;
    }

    .comment-form {
      display: grid;
      gap: 8px;
    }

    textarea {
      width: 100%;
      min-height: 86px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
      color: var(--ink);
    }

    textarea:focus,
    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(8, 127, 115, 0.25);
      outline-offset: 2px;
    }

    .export-panel {
      display: none;
      max-width: 1440px;
      margin: 0 auto 28px;
      padding: 16px;
    }

    .export-panel.is-open {
      display: block;
    }

    .export-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .export-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 36px));
      border-radius: 8px;
      padding: 12px 14px;
      background: #17202a;
      color: #ffffff;
      box-shadow: var(--shadow);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.is-visible {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 1080px) {
      .board {
        grid-template-columns: 280px minmax(0, 1fr);
      }

      .workspace {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        position: static;
        align-items: stretch;
        flex-direction: column;
        padding: 14px;
      }

      .topbar .ghost-button {
        width: 100%;
      }

      .board {
        display: block;
        padding: 0 12px 20px;
      }

      .task-panel {
        margin: 12px 0;
      }

      .status-tabs {
        display: flex;
      }

      .task-groups {
        max-height: 280px;
        overflow: auto;
      }

      .task-group.is-filtered-out {
        display: none;
      }

      .workspace {
        display: block;
      }

      .preview-panel,
      .review-panel {
        margin-bottom: 12px;
      }

      .preview-hero {
        flex-direction: column;
      }

      .preview-actions {
        justify-content: stretch;
      }

      .preview-actions button {
        flex: 1 1 140px;
      }

      .artifact-meta {
        grid-template-columns: 1fr;
      }

      .export-panel {
        margin: 0 12px 20px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>PM Review Board</h1>
      <p>Track AI-generated artifacts from draft to review-ready with visible risks.</p>
    </div>
    <button class="ghost-button" id="exportTopButton" type="button">Export Summary</button>
  </header>

  <main class="board">
    <aside class="task-panel" aria-label="Task list grouped by status">
      <div class="panel-header">
        <h2>Task List</h2>
        <span class="count-pill" id="taskCount">0</span>
      </div>
      <nav class="status-tabs" aria-label="Status filter">
        <button class="tab-button is-active" type="button" data-filter="all">All</button>
        <button class="tab-button" type="button" data-filter="draft">Draft</button>
        <button class="tab-button" type="button" data-filter="ready for review">Ready</button>
        <button class="tab-button" type="button" data-filter="blocked">Blocked</button>
      </nav>
      <div class="task-groups" id="taskGroups"></div>
    </aside>

    <section class="workspace" aria-live="polite">
      <article class="preview-panel" aria-label="Artifact preview">
        <div class="preview-hero">
          <div class="preview-title">
            <h2 id="previewTitle"></h2>
            <p id="previewSummary"></p>
          </div>
          <div class="preview-actions">
            <button class="primary-button" id="markReadyButton" type="button">Mark ready</button>
            <button class="secondary-button" id="exportInlineButton" type="button">Export checklist</button>
          </div>
        </div>
        <p class="review-status" id="reviewStatus"></p>
        <div class="artifact">
          <div class="artifact-meta" id="artifactMeta"></div>
          <div class="doc-preview" id="docPreview"></div>
        </div>
      </article>

      <aside class="review-panel" aria-label="Review details">
        <section class="review-section">
          <h2>Risk Checklist</h2>
          <p class="review-lede" id="riskSummary"></p>
          <ul class="risk-list" id="riskList"></ul>
        </section>
        <section class="review-section">
          <h2>Reviewer Comments</h2>
          <ul class="comment-list" id="commentList"></ul>
          <form class="comment-form" id="commentForm">
            <label for="commentInput">Add PM note</label>
            <textarea id="commentInput" placeholder="Add a short review note for the artifact owner."></textarea>
            <button class="secondary-button" type="submit">Add comment</button>
          </form>
        </section>
      </aside>
    </section>
  </main>

  <section class="export-panel" id="exportPanel" aria-label="Exportable acceptance summary">
    <div class="export-header">
      <h2>Exportable Ticket Summary</h2>
      <div class="export-actions">
        <button class="secondary-button" id="copyExportButton" type="button">Copy text</button>
        <button class="ghost-button" id="closeExportButton" type="button">Close</button>
      </div>
    </div>
    <textarea id="exportText" readonly></textarea>
  </section>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const tasks = [
      {
        id: "draft-prd",
        title: "PM Review Board PRD",
        status: "draft",
        owner: "Avery PM",
        artifactType: "PRD",
        updated: "Today 10:24",
        summary: "A PRD for one place to review AI-generated project artifacts.",
        sections: [
          {
            heading: "Problem",
            body: "PMs receive PRDs, landing pages, dashboards, and analysis memos from AI agents. They need one place to see readiness and unresolved risk before handoff."
          },
          {
            heading: "Scope",
            bullets: [
              "Group tasks by draft, ready for review, and blocked.",
              "Keep the artifact preview visible while reviewing risks and comments.",
              "Let the PM mark an artifact ready once review risks are cleared."
            ]
          },
          {
            heading: "Acceptance Notes",
            bullets: [
              "Reviewers can see unresolved risks without reading code.",
              "The engineer receives a clear checklist to paste into a ticket."
            ]
          }
        ],
        risks: [
          { id: "acceptance", label: "Acceptance checklist is not specific enough for engineer handoff.", severity: "high", checked: false },
          { id: "customer-data", label: "Artifact mentions customer data and needs explicit review.", severity: "high", checked: false },
          { id: "ownership", label: "Review owner is assumed but not confirmed.", severity: "medium", checked: false }
        ],
        comments: [
          { role: "PM", text: "Resolve the customer-data flag before this moves to ready for review." },
          { role: "Engineer", text: "Please keep acceptance checks in a paste-ready format." }
        ]
      },
      {
        id: "draft-landing",
        title: "Landing Page Copy Refresh",
        status: "draft",
        owner: "Mina PM",
        artifactType: "Landing page",
        updated: "Yesterday 16:10",
        summary: "Copy refresh for an AI-assisted project intake page.",
        sections: [
          {
            heading: "Draft Preview",
            body: "The page explains the intake flow, review checkpoints, and artifact ownership. The core message is readable but still needs PM review."
          },
          {
            heading: "Open Decisions",
            bullets: [
              "Confirm whether the page should mention AI-generated artifacts directly.",
              "Replace vague benefit language with review-board outcomes."
            ]
          }
        ],
        risks: [
          { id: "claims", label: "Marketing claim is not backed by a metric.", severity: "medium", checked: false },
          { id: "acceptance", label: "Ready criteria for final copy are missing.", severity: "high", checked: false }
        ],
        comments: [
          { role: "Designer", text: "Preview should stay visible while I review copy issues." }
        ]
      },
      {
        id: "ready-dashboard",
        title: "Insights Dashboard Spec",
        status: "ready for review",
        owner: "Jordan PM",
        artifactType: "Dashboard spec",
        updated: "Today 09:05",
        summary: "A review-ready dashboard spec with risks cleared for engineering review.",
        sections: [
          {
            heading: "Decision Summary",
            body: "The dashboard will show artifact volume, review latency, and unresolved-risk count for PM triage."
          },
          {
            heading: "Acceptance Checks",
            bullets: [
              "Dashboard cards define data source assumptions.",
              "Unresolved risk count is visible without opening each artifact.",
              "Empty states explain when no review tasks exist."
            ]
          }
        ],
        risks: [
          { id: "data-source", label: "Data source assumptions are documented.", severity: "medium", checked: true },
          { id: "privacy", label: "No customer data is shown in dashboard examples.", severity: "high", checked: true }
        ],
        comments: [
          { role: "PM", text: "Ready for engineering review. Acceptance checks are clear." },
          { role: "Legal", text: "Customer-data flag cleared based on the current artifact text." }
        ]
      },
      {
        id: "blocked-memo",
        title: "Customer Data Export Memo",
        status: "blocked",
        owner: "Sam PM",
        artifactType: "Analysis memo",
        updated: "May 30 14:35",
        summary: "A memo blocked because it references customer data and unresolved review ownership.",
        sections: [
          {
            heading: "Blocked Reason",
            body: "The artifact discusses customer data handling. It cannot move forward until the PM confirms the review path and removes or approves sensitive examples."
          },
          {
            heading: "Next Action",
            bullets: [
              "Legal must review customer-data references.",
              "PM must define a non-sensitive example for engineering handoff."
            ]
          }
        ],
        risks: [
          { id: "customer-data", label: "Customer data is mentioned in the artifact.", severity: "high", checked: false },
          { id: "legal-review", label: "Legal review owner is missing.", severity: "high", checked: false }
        ],
        comments: [
          { role: "Legal", text: "Flag any artifact that mentions customer data before marking it ready." }
        ]
      }
    ];

    const statusOrder = ["draft", "ready for review", "blocked"];
    const statusLabels = {
      "draft": "Draft",
      "ready for review": "Ready for Review",
      "blocked": "Blocked"
    };

    let selectedTaskId = "draft-prd";
    let activeFilter = "all";
    let toastTimer;

    const taskGroupsEl = document.getElementById("taskGroups");
    const taskCountEl = document.getElementById("taskCount");
    const previewTitleEl = document.getElementById("previewTitle");
    const previewSummaryEl = document.getElementById("previewSummary");
    const reviewStatusEl = document.getElementById("reviewStatus");
    const artifactMetaEl = document.getElementById("artifactMeta");
    const docPreviewEl = document.getElementById("docPreview");
    const riskSummaryEl = document.getElementById("riskSummary");
    const riskListEl = document.getElementById("riskList");
    const commentListEl = document.getElementById("commentList");
    const commentFormEl = document.getElementById("commentForm");
    const commentInputEl = document.getElementById("commentInput");
    const markReadyButtonEl = document.getElementById("markReadyButton");
    const exportPanelEl = document.getElementById("exportPanel");
    const exportTextEl = document.getElementById("exportText");
    const toastEl = document.getElementById("toast");

    function selectedTask() {
      return tasks.find((task) => task.id === selectedTaskId);
    }

    function openRiskCount(task) {
      return task.risks.filter((risk) => !risk.checked).length;
    }

    function statusClass(status) {
      if (status === "ready for review") return "ready";
      return status;
    }

    function renderTaskGroups() {
      taskCountEl.textContent = tasks.length;
      taskGroupsEl.innerHTML = "";

      statusOrder.forEach((status) => {
        const groupTasks = tasks.filter((task) => task.status === status);
        const section = document.createElement("section");
        section.className = "task-group";
        section.dataset.status = status;
        if (activeFilter !== "all" && activeFilter !== status) {
          section.classList.add("is-filtered-out");
        }

        const header = document.createElement("div");
        header.className = "group-title";
        header.innerHTML = `<span>${statusLabels[status]}</span><span>${groupTasks.length}</span>`;
        section.appendChild(header);

        groupTasks.forEach((task) => {
          const button = document.createElement("button");
          const unresolved = openRiskCount(task);
          button.type = "button";
          button.className = `task-button${task.id === selectedTaskId ? " is-selected" : ""}`;
          button.dataset.taskId = task.id;
          button.innerHTML = `
            <span>
              <span class="task-title">${task.title}</span>
              <span class="task-meta">${task.artifactType} - ${task.updated}</span>
            </span>
            <span class="risk-chip ${unresolved === 0 ? "clear" : ""}">${unresolved === 0 ? "Clear" : `${unresolved} risk${unresolved === 1 ? "" : "s"}`}</span>
          `;
          button.addEventListener("click", () => {
            selectedTaskId = task.id;
            render();
          });
          section.appendChild(button);
        });

        taskGroupsEl.appendChild(section);
      });
    }

    function renderPreview(task) {
      previewTitleEl.textContent = task.title;
      previewSummaryEl.textContent = task.summary;

      const unresolved = openRiskCount(task);
      reviewStatusEl.className = `review-status ${statusClass(task.status)}`;
      if (task.status === "ready for review") {
        reviewStatusEl.textContent = "Ready for review. All listed risks are cleared.";
      } else if (task.status === "blocked") {
        reviewStatusEl.textContent = "Blocked. High-priority review risks must be resolved first.";
      } else {
        reviewStatusEl.textContent = unresolved === 0
          ? "Draft with no unresolved risks. This can be marked ready."
          : `Draft with ${unresolved} unresolved review risk${unresolved === 1 ? "" : "s"}.`;
      }

      artifactMetaEl.innerHTML = [
        ["Status", statusLabels[task.status]],
        ["Owner", task.owner],
        ["Artifact", task.artifactType]
      ].map(([label, value]) => `
        <div class="meta-box">
          <span class="meta-label">${label}</span>
          <span class="meta-value">${value}</span>
        </div>
      `).join("");

      docPreviewEl.innerHTML = task.sections.map((section) => {
        const content = section.bullets
          ? `<ul>${section.bullets.map((item) => `<li>${item}</li>`).join("")}</ul>`
          : `<p>${section.body}</p>`;
        return `<section class="doc-section"><h3>${section.heading}</h3>${content}</section>`;
      }).join("");

      markReadyButtonEl.disabled = task.status !== "draft" || unresolved > 0;
      markReadyButtonEl.textContent = task.status === "ready for review"
        ? "Already ready"
        : task.status === "blocked"
          ? "Blocked"
          : unresolved > 0
            ? "Resolve risks first"
            : "Mark ready";
    }

    function renderRisks(task) {
      const unresolved = openRiskCount(task);
      riskSummaryEl.textContent = unresolved === 0
        ? "No unresolved risks are listed for this artifact."
        : `${unresolved} unresolved risk${unresolved === 1 ? "" : "s"} must be cleared before ready handoff.`;

      riskListEl.innerHTML = "";
      task.risks.forEach((risk) => {
        const item = document.createElement("li");
        item.className = "risk-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = `${task.id}-${risk.id}`;
        checkbox.checked = risk.checked;
        checkbox.addEventListener("change", () => {
          risk.checked = checkbox.checked;
          render();
        });

        const copy = document.createElement("div");
        copy.className = "risk-copy";
        copy.innerHTML = `
          <label for="${task.id}-${risk.id}">${risk.label}</label>
          <span class="severity-chip ${risk.severity}">${risk.severity} priority</span>
        `;

        item.append(checkbox, copy);
        riskListEl.appendChild(item);
      });
    }

    function renderComments(task) {
      commentListEl.innerHTML = task.comments.map((comment) => `
        <li class="comment">
          <strong>${comment.role}</strong>
          <span>${comment.text}</span>
        </li>
      `).join("");
      commentInputEl.value = "";
    }

    function buildExportText(task) {
      const unresolved = task.risks.filter((risk) => !risk.checked);
      const cleared = task.risks.filter((risk) => risk.checked);
      const acceptanceLines = [
        "Task list shows current status grouped as draft, ready for review, or blocked.",
        "Artifact preview remains visible while PM reviews risks and comments.",
        "Unresolved risks are visible before Mark ready can be completed.",
        "Reviewer comments are visible with role labels.",
        "Acceptance checklist is available as local ticket text."
      ];

      return [
        `Ticket Summary: ${task.title}`,
        `Status: ${statusLabels[task.status]}`,
        `Owner: ${task.owner}`,
        `Artifact Type: ${task.artifactType}`,
        "",
        "Unresolved Risks:",
        ...(unresolved.length ? unresolved.map((risk) => `- [ ] ${risk.label} (${risk.severity})`) : ["- None"]),
        "",
        "Cleared Risks:",
        ...(cleared.length ? cleared.map((risk) => `- [x] ${risk.label} (${risk.severity})`) : ["- None"]),
        "",
        "Acceptance Checks:",
        ...acceptanceLines.map((line) => `- [ ] ${line}`),
        "",
        "Latest Comments:",
        ...task.comments.map((comment) => `- ${comment.role}: ${comment.text}`)
      ].join("\n");
    }

    function renderExport(task) {
      exportTextEl.value = buildExportText(task);
    }

    function render() {
      const task = selectedTask();
      renderTaskGroups();
      renderPreview(task);
      renderRisks(task);
      renderComments(task);
      renderExport(task);
    }

    function showToast(message) {
      window.clearTimeout(toastTimer);
      toastEl.textContent = message;
      toastEl.classList.add("is-visible");
      toastTimer = window.setTimeout(() => {
        toastEl.classList.remove("is-visible");
      }, 2400);
    }

    markReadyButtonEl.addEventListener("click", () => {
      const task = selectedTask();
      const unresolved = openRiskCount(task);
      if (task.status !== "draft" || unresolved > 0) return;
      task.status = "ready for review";
      activeFilter = "all";
      document.querySelectorAll(".tab-button").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.filter === "all");
      });
      render();
      showToast(`${task.title} moved to Ready for Review.`);
    });

    commentFormEl.addEventListener("submit", (event) => {
      event.preventDefault();
      const value = commentInputEl.value.trim();
      if (!value) return;
      selectedTask().comments.push({ role: "PM", text: value });
      render();
      showToast("Comment added.");
    });

    document.querySelectorAll(".tab-button").forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        document.querySelectorAll(".tab-button").forEach((tab) => {
          tab.classList.toggle("is-active", tab === button);
        });
        renderTaskGroups();
      });
    });

    function openExportPanel() {
      renderExport(selectedTask());
      exportPanelEl.classList.add("is-open");
      exportTextEl.focus();
      exportTextEl.select();
    }

    document.getElementById("exportTopButton").addEventListener("click", openExportPanel);
    document.getElementById("exportInlineButton").addEventListener("click", openExportPanel);
    document.getElementById("closeExportButton").addEventListener("click", () => {
      exportPanelEl.classList.remove("is-open");
    });

    document.getElementById("copyExportButton").addEventListener("click", async () => {
      exportTextEl.select();
      try {
        await navigator.clipboard.writeText(exportTextEl.value);
        showToast("Ticket summary copied.");
      } catch (error) {
        showToast("Ticket summary selected for copying.");
      }
    });

    render();
  </script>
</body>
</html>
